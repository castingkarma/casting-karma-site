<!doctype html>
<html lang="en">

<style>
:root{--navy:#0b1f33;--navy2:#0e2a45;--navyline:#1d3a58;--paper:#f7f5f0;--card:#fff;--ink:#0b1f33;--mut:#5f6b76;--line:#e7e3da;--teal:#0ca678;--tealL:#13b98a;--amber:#f59f00;--red:#c0442b}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);background:var(--paper);line-height:1.55;-webkit-font-smoothing:antialiased}
.wrap{max-width:1120px;margin:0 auto;padding:0 24px}
a{color:inherit}
header.nav{position:sticky;top:0;z-index:50;background:rgba(11,31,51,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--navyline)}
.nav .wrap{display:flex;align-items:center;gap:20px;height:60px}
.brand{font-weight:800;font-size:18px;color:#fff;letter-spacing:-.02em}
.brand b{color:var(--tealL)}
.studioTag{font-size:11px;color:#9fb2c4;margin-left:2px}
.navlinks{display:flex;gap:22px;margin-left:auto}
.navlinks a{color:#cdd8e3;text-decoration:none;font-size:14px;font-weight:500}
.navlinks a:hover{color:#fff}
.navcta{background:var(--teal);color:#fff;padding:9px 16px;border-radius:8px;font-weight:600;font-size:14px;text-decoration:none;white-space:nowrap}
.navcta:hover{background:var(--tealL)}
.pill{display:inline-flex;align-items:center;gap:7px;background:rgba(245,159,0,.14);color:var(--amber);border:1px solid rgba(245,159,0,.35);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.hero{background:var(--navy);color:#fff;padding:44px 0 56px}
.hero .grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:44px;align-items:center}
.hero .grid>div{min-width:0}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--tealL);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}
h1{font-size:30px;line-height:1.16;letter-spacing:-.02em;font-weight:800}
.hero .lead{color:#c3d0dc;font-size:16px;margin:16px 0 24px;max-width:44ch}
.hero .lead b{color:#fff;font-weight:600}
.btns{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.btn{border:0;cursor:pointer;font-weight:600;font-size:15px;padding:13px 20px;border-radius:10px;text-decoration:none;display:inline-block}
.btn.primary{background:var(--teal);color:#fff}
.btn.primary:hover{background:var(--tealL)}
.btn.ghost{background:transparent;color:#cdd8e3;border:1px solid var(--navyline)}
.btn.ghost:hover{color:#fff;border-color:#3a5f82}
.undr{color:#8ea1b4;font-size:12px;margin-top:14px;font-family:'IBM Plex Mono',monospace}
.pv{background:var(--navy2);border:1px solid var(--navyline);border-radius:16px;padding:13px;box-shadow:0 30px 60px -30px rgba(0,0,0,.6)}
.pv .bar{display:flex;align-items:center;justify-content:space-between;padding:3px 5px 11px}
.pv .bar .t{font-size:12px;color:#cdd8e3;font-weight:600}
.pv .bar .badge{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--amber);border:1px solid rgba(245,159,0,.4);border-radius:5px;padding:2px 7px}
.track{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:13px;scrollbar-width:none}
.track::-webkit-scrollbar{display:none}
.screen{scroll-snap-align:center;flex:0 0 100%;background:#0a1a2b;border:1px solid var(--navyline);border-radius:11px;padding:13px;min-height:240px}
.screen .st{font-size:12px;color:#e8eef4;font-family:'IBM Plex Mono',monospace;margin-bottom:11px;display:flex;justify-content:space-between;align-items:center}
.screen .role{font-size:9px;color:#0a1a2b;background:var(--tealL);border-radius:4px;padding:2px 7px;font-weight:700;letter-spacing:.03em}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:6px}
.tile{background:#0e2338;border:1px solid var(--navyline);border-radius:8px;padding:9px 10px}
.tile .v{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.02em}
.tile .k{font-size:10px;color:#8ea1b4;margin-top:1px}
.row{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid #16324c}
.row:first-of-type{border-top:0}
.rc{width:26px;height:26px;border-radius:7px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.rc.o{background:rgba(12,166,120,.16);color:var(--tealL);border:1px solid rgba(12,166,120,.4)}
.rc.n{background:rgba(245,159,0,.14);color:var(--amber);border:1px solid rgba(245,159,0,.35)}
.rt{flex:1}
.rt .a{font-size:13px;color:#e8eef4;font-weight:600}
.rt .b{font-size:11px;color:#8ea1b4;margin-top:2px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 7px;border-radius:5px;white-space:nowrap;align-self:center}
.tag.o{background:rgba(12,166,120,.16);color:var(--tealL)}
.tag.n{background:rgba(245,159,0,.14);color:var(--amber)}
.dots{display:flex;gap:7px;justify-content:center;padding:13px 0 3px}
.dots button{width:8px;height:8px;border-radius:50%;border:0;background:#2c4b6a;cursor:pointer;padding:0}
.dots button.on{background:var(--tealL);width:22px;border-radius:5px}
.pvcap{text-align:center;color:#7a8da0;font-size:11px;font-family:'IBM Plex Mono',monospace;padding-top:4px}
section.blk{padding:56px 0}
.kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
h2{font-size:29px;line-height:1.15;letter-spacing:-.02em;font-weight:800;max-width:22ch}
.sub{color:var(--mut);font-size:16px;margin-top:12px;max-width:58ch}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:32px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px}
.stat .fig{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.stat .lbl{font-size:13px;color:var(--mut);margin-top:7px;line-height:1.4}
.stat .src{font-size:11px;margin-top:10px;font-family:'IBM Plex Mono',monospace}
.stat .src a{color:var(--teal);text-decoration:none}
.stat .src a:hover{text-decoration:underline}
.scaleline{margin-top:22px;font-size:15px;color:var(--mut)}
.scaleline b{color:var(--ink);font-weight:600}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}
.step{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:20px}
.step .n{width:30px;height:30px;border-radius:8px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'IBM Plex Mono',monospace;margin-bottom:13px}
.step .b{font-weight:600;font-size:15px}
.step .s{color:var(--mut);font-size:13px;margin-top:6px}
.cmp{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:32px}
.cmpc{border:1px solid var(--line);border-radius:13px;padding:22px;background:var(--card)}
.cmpc.us{border:2px solid var(--teal);background:#f0fbf7}
.cmpc .cn{font-weight:700;font-size:16px}
.cmpc .cost{font-size:22px;font-weight:800;margin:12px 0 4px;letter-spacing:-.02em}
.cmpc.us .cost{color:var(--teal)}
.cmpc .meta{font-size:13px;color:var(--mut)}
.cmpc .note{font-size:13px;margin-top:12px;color:var(--ink)}
.cmpc.us .note{color:#0a5c46}
.valbul{list-style:none;margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:12px 26px}
.valbul li{position:relative;padding-left:26px;font-size:15px;color:var(--ink)}
.valbul li::before{content:'✓';position:absolute;left:0;top:0;color:var(--teal);font-weight:800}
.proof{margin-top:26px;background:var(--navy);color:#fff;border-radius:13px;padding:20px 24px;font-size:16px}
.proof b{color:var(--tealL)}
.pricewrap{background:var(--navy);color:#fff}
.pricewrap h2{color:#fff}
.pricewrap .sub{color:#c3d0dc}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:32px;max-width:760px}
.pc{background:var(--navy2);border:1px solid var(--navyline);border-radius:16px;padding:26px}
.pc.feat{border:2px solid var(--teal);position:relative}
.pc .flag{position:absolute;top:-11px;left:24px;background:var(--teal);color:#fff;font-size:11px;font-weight:700;font-family:'IBM Plex Mono',monospace;padding:3px 11px;border-radius:6px;text-transform:uppercase;letter-spacing:.03em}
.pc .pn{font-weight:700;font-size:17px}
.pc .beta{display:flex;align-items:baseline;gap:8px;margin-top:14px;flex-wrap:wrap}
.pc .beta .amt{font-size:34px;font-weight:800;color:#fff;letter-spacing:-.02em}
.pc .beta .u{color:#a9b8c7;font-size:14px}
.pc .beta .was{color:#8ea1b4;text-decoration:line-through;font-size:15px;font-family:'IBM Plex Mono',monospace;margin-left:2px}
.pc .lock{font-size:12px;color:var(--amber);font-family:'IBM Plex Mono',monospace;margin-top:7px}
.pc ul{list-style:none;margin:18px 0 22px}
.pc ul li{position:relative;padding:7px 0 7px 24px;font-size:14px;color:#d7e0e9;border-top:1px solid #16324c}
.pc ul li::before{content:'✓';position:absolute;left:0;color:var(--tealL);font-weight:700}
.pc .pcta{display:block;text-align:center;background:var(--teal);color:#fff;padding:13px;border-radius:9px;font-weight:600;text-decoration:none;cursor:pointer;border:0;width:100%;font-size:15px}
.pc .pcta:hover{background:var(--tealL)}
.pc:not(.feat) .pcta{background:transparent;border:1px solid var(--teal);color:var(--tealL)}
.onetime{text-align:center;color:#a9b8c7;font-size:14px;margin-top:22px}
.onetime a{color:var(--tealL);cursor:pointer;text-decoration:underline}
.betanote{text-align:center;color:#8ea1b4;font-size:13px;margin-top:12px;font-family:'IBM Plex Mono',monospace}
.formwrap{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px;max-width:620px;margin:34px auto 0;box-shadow:0 24px 50px -30px rgba(11,31,51,.25)}
.formwrap label{display:block;font-weight:600;font-size:13px;margin:16px 0 6px}
.formwrap input,.formwrap select{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:9px;font-size:15px;font-family:inherit;background:#fff}
.formwrap input:focus,.formwrap select:focus{outline:0;border-color:var(--teal);box-shadow:0 0 0 3px rgba(12,166,120,.13)}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.formsubmit{margin-top:22px;width:100%;background:var(--teal);color:#fff;border:0;padding:15px;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer}
.formsubmit:hover{background:var(--tealL)}
.fine{font-size:12.5px;color:var(--mut);margin-top:14px;text-align:center}
.fine b{color:var(--ink)}
.okmsg{display:none;text-align:center;padding:30px 10px}
.okmsg .big{font-size:22px;font-weight:800;color:var(--teal)}
footer{background:var(--navy);color:#8ea1b4;padding:26px 0;border-top:1px solid var(--navyline);font-size:13px}
footer a{color:#cdd8e3}
@media(max-width:820px){
 .hero .grid,.stats,.steps,.cmp,.cards,.formgrid,.valbul{grid-template-columns:1fr}
 h1{font-size:29px}.navlinks{display:none}.stats{grid-template-columns:1fr 1fr}
}
</style>
</head>

const C=CFG;
const navHtml=`<header class="nav"><div class="wrap">
  <div><span class="brand">${C.brandName.replace(/Clear/,'<b>Clear</b>')}</span> <span class="studioTag">a Casting Karma studio project</span></div>

function screenBody(s){
  var t = (s.kind==='stats' && s.tiles) ? `<div class="tiles">${s.tiles.map(x=>`<div class="tile"><div class="v">${x.v}</div><div class="k">${x.k}</div></div>`).join('')}</div>` : '';
  var r = (s.rows||[]).map(r=>`<div class="row"><div class="rc ${r.c}">${r.id}</div><div class="rt"><div class="a">${r.a}</div><div class="b">${r.b}</div></div><div class="tag ${r.tt}">${r.tag}</div></div>`).join('');
  return t+r;
}
function previewHtml(){

     <div class="st"><span>${s.t}</span><span class="role">${s.role}</span></div>${screenBody(s)}</div>`).join('');
  const dots=C.preview.screens.map((s,i)=>`<button data-i="${i}" class="${i===0?'on':''}" aria-label="screen ${i+1}"></button>`).join('');
  return `<div class="pv">
    <div class="bar"><span class="t">Inside the portal</span><span class="badge">INTERACTIVE — scroll →</span></div>
    <div class="track" id="track">${scr}</div>
    <div class="dots" id="dots">${dots}</div>
    <div class="pvcap" id="pvcap">${C.preview.screens[0].cap}</div>
  </div>`;
}

    <h1>${C.hero.headline}</h1>

    <div class="btns"><a class="btn primary" href="#form">${C.hero.ctaVerb}</a><a class="btn ghost" href="#how">${C.hero.ctaGhost}</a></div>
    <div class="undr">${C.hero.undr}</div>
  </div>
  <div>${previewHtml()}</div>
</div></div></section>`;

const problemHtml=`<section class="blk" id="problem"><div class="wrap">
  <div class="kicker">${C.problem.kicker}</div>
  <h2>${C.problem.title}</h2>
  <div class="stats">${C.problem.stats.map(s=>`<div class="stat"><div class="fig">${s.fig}</div><div class="lbl">${s.lbl}</div><div class="src"><a href="${s.url}" target="_blank" rel="noopener">${s.src} ↗</a></div></div>`).join('')}</div>
  <div class="scaleline">${C.problem.scaleline}</div>
</div></section>`;

const howHtml=`<section class="blk" id="how" style="background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line)"><div class="wrap">
  <div class="kicker">${C.how.kicker}</div>
  <h2>${C.how.title}</h2>
  <div class="steps">${C.how.steps.map((s,i)=>`<div class="step"><div class="n">${i+1}</div><div class="b">${s.b}</div><div class="s">${s.s}</div></div>`).join('')}</div>
</div></section>`;

const valueHtml=`<section class="blk" id="value"><div class="wrap">
  <div class="kicker">${C.value.kicker}</div>
  <h2>${C.value.title}</h2>
  <div class="cmp">${C.value.compare.map(c=>`<div class="cmpc ${c.us?'us':''}"><div class="cn">${c.us?'✓ ':''}${c.n}</div><div class="cost">${c.cost}</div><div class="meta">${c.meta}</div><div class="note">${c.note}</div></div>`).join('')}</div>
  <ul class="valbul">${C.value.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
  <div class="proof">${C.value.proof}</div>
</div></section>`;

const priceHtml=`<section class="blk pricewrap" id="pricing"><div class="wrap">
  <div class="kicker">${C.pricing.kicker}</div>
  <h2>${C.pricing.title}</h2>
  <p class="sub">${C.pricing.sub}</p>
  <div class="cards">${C.pricing.cards.map(p=>`<div class="pc ${p.feat?'feat':''}">${p.flag?`<div class="flag">${p.flag}</div>`:''}
     <div class="pn">${p.name}</div>
     <div class="beta"><span class="amt">${p.beta}</span><span class="u">${p.unit}</span><span class="was">${p.reg}</span></div>
     <div class="lock">🔒 ${p.lock}</div>
     <ul>${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
     <button class="pcta" onclick="pick('${p.name}')">${p.cta}</button>
   </div>`).join('')}</div>
  <div class="onetime">${C.pricing.oneTime}</div>
  <div class="betanote">${C.pricing.betaNote}</div>
</div></section>`;

const formHtml=`<section class="blk" id="form" style="background:#fff;border-top:1px solid var(--line)"><div class="wrap">
  <div style="text-align:center"><div class="kicker" style="color:var(--teal)">${C.form.kicker}</div>
  <h2 style="margin:0 auto">${C.form.title}</h2><p class="sub" style="margin:12px auto 0">${C.form.sub}</p></div>
  <div class="formwrap">
   <form id="ck-form">
     <div class="formgrid">
      ${C.form.fields.map(f=>{
        const full=(f.name==='email'||(f.type==='text'&&f.name==='business'))?'style="grid-column:1/-1"':'';
        if(f.type==='select') return `<div ${full}><label>${f.label}</label><select name="${f.name}" ${f.required?'required':''}><option value="">Select…</option>${f.options.map(o=>`<option>${o}</option>`).join('')}</select></div>`;
        return `<div ${full}><label>${f.label}</label><input name="${f.name}" type="${f.type}" ${f.required?'required':''}></div>`;
      }).join('')}
     </div>
     <button class="formsubmit" type="submit">${C.form.submit}</button>
     <div class="fine">${C.form.finePrint}</div>
   </form>
   <div class="okmsg" id="okmsg"><div class="big">You're on the early-access list.</div><p style="color:var(--mut);margin-top:8px">We'll confirm your rate by email before anything is billed.</p></div>
  </div>
</div></section>`;

const footHtml=`<footer><div class="wrap">A <a href="${C.studio.url}" target="_blank" rel="noopener">${C.studio.name}</a> studio project · ${C.studio.city}</div></footer>`;

document.getElementById('app').innerHTML = navHtml+heroHtml+problemHtml+howHtml+valueHtml+priceHtml+formHtml+footHtml;

(function(){
  const track=document.getElementById('track'), dots=[...document.querySelectorAll('#dots button')], cap=document.getElementById('pvcap');
  function setActive(i){dots.forEach((d,j)=>d.classList.toggle('on',j===i)); if(C.preview.screens[i])cap.textContent=C.preview.screens[i].cap;}
  dots.forEach(d=>d.addEventListener('click',()=>{const i=+d.dataset.i;track.scrollTo({left:track.clientWidth*i,behavior:'smooth'});setActive(i);}));
  let t; track.addEventListener('scroll',()=>{clearTimeout(t);t=setTimeout(()=>{const i=Math.round(track.scrollLeft/track.clientWidth);setActive(i);},80);});
  let idx=0; setInterval(()=>{ if(document.hidden)return; idx=(idx+1)%C.preview.screens.length; track.scrollTo({left:track.clientWidth*idx,behavior:'smooth'}); setActive(idx); },4500);
})();

function pick(v){const sel=document.querySelector('select[name=plan]'); if(sel){[...sel.options].forEach(o=>{if(o.value.indexOf(v)===0)sel.value=o.value;});} document.getElementById('form').scrollIntoView({behavior:'smooth'});}
window.pick=pick;

document.getElementById('ck-form').addEventListener('submit',async function(e){
  e.preventDefault();
  const btn=this.querySelector('.formsubmit'); btn.disabled=true; btn.textContent='Reserving…';
  const fd=Object.fromEntries(new FormData(this).entries());
  fd.project=C.projectKey; fd.ref=location.pathname; fd.ts=new Date().toISOString();
  let ok=false;
  try{ const r=await fetch(C.captureEndpoint||'/api/lead',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)}); const j=await r.json().catch(()=>({})); ok=r.ok && j.ok!==false; }catch(err){ ok=false; }
  if(ok){ this.style.display='none'; document.getElementById('okmsg').style.display='block'; }
  else{ btn.disabled=false; btn.textContent=C.form.submit; const f=document.querySelector('.fine'); f.innerHTML='Something went wrong — email <a href="mailto:contact@castingkarmallc.com">contact@castingkarmallc.com</a> and we will add you.'; f.style.color='#c0442b'; }
});
</script>
</body>
</html>
